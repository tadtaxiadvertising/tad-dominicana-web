<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAD Dominicana - Tu Vehículo, Tu Valla Digital</title>
    <meta name="description" content="Gana dinero extra mientras conduces. Instalamos tablets de 10 pulgadas para entretener a tus pasajeros y generar ingresos por publicidad." />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; connect-src 'self' https://script.google.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    
    <script type="text/babel">
        // ============================================
        // SEGURIDAD - TAD DOMINICANA
        // ============================================
        
        // URL ofuscada (Base64) para Google Apps Script
        const SCRIPT_URL_B64 = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyby9zL0FLZnljYnlGNVNrM1I1MWwwSjNiUDVsZ00yX01WNlFzNDdXby1hOHdRRm1lNWNCcGFOVW5sSDg1aDVaMzdQNl8yZlhaUkRWaC9leGVj";
        const scriptURL = atob(SCRIPT_URL_B64);
        
        // WhatsApp (ofuscado)
        const WHATSAPP_B64 = "MTg0OTUwNDM4NzI=";
        const whatsappPhone = atob(WHATSAPP_B64);
        
        // Rate Limiting - Prevenir spam
        const RATE_LIMIT_MS = 60000; // 1 minuto entre envíos
        const STORAGE_KEY = 'tad_last_submit';
        
        const checkRateLimit = () => {
            const lastSubmit = localStorage.getItem(STORAGE_KEY);
            if (lastSubmit) {
                const elapsed = Date.now() - parseInt(lastSubmit);
                if (elapsed < RATE_LIMIT_MS) {
                    const waitTime = Math.ceil((RATE_LIMIT_MS - elapsed) / 1000);
                    return { allowed: false, waitTime };
                }
            }
            return { allowed: true };
        };
        
        const setRateLimit = () => {
            localStorage.setItem(STORAGE_KEY, Date.now().toString());
        };
        
        // Sanitización de inputs - Prevenir XSS
        const sanitizeInput = (input) => {
            if (typeof input !== 'string') return input;
            return input
                .replace(/[<>]/g, '') // Eliminar < y >
                .replace(/javascript:/gi, '') // Eliminar javascript:
                .replace(/on\w+=/gi, '') // Eliminar eventos onclick, onload, etc.
                .trim()
                .substring(0, 500); // Limitar longitud
        };
        
        // Validación de email
        const isValidEmail = (email) => {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        };
        
        // Validación de teléfono (RD)
        const isValidPhone = (phone) => {
            const re = /^(\+1|1)?[23456789]\d{9}$/;
            return re.test(phone.replace(/[\s\-\(\)]/g, ''));
        };
        
        // Validación de cédula (RD) - 11 dígitos
        const isValidCedula = (cedula) => {
            const clean = cedula.replace(/[\-\s]/g, '');
            return /^\d{11}$/.test(clean);
        };
        
        // Validación de placa (RD) - 3 letras + 3 números o 3 letras + 4 números
        const isValidPlaca = (placa) => {
            const re = /^[A-Z]{3}\d{3,4}$/i;
            return re.test(placa.replace(/[\-\s]/g, ''));
        };
        
        // ============================================

        // Logo Component
        const LogoTAD = () => (
            <svg viewBox="0 0 200 60" fill="none" className="w-32 h-auto">
                <rect x="35" y="15" width="45" height="30" rx="5" stroke="#FFD700" strokeWidth="4"/>
                <polygon points="50,22 68,30 50,38" fill="#FFD700"/>
                <text x="90" y="40" fill="#FFD700" fontFamily="sans-serif" fontSize="28" fontWeight="bold">TAD</text>
            </svg>
        );

        // Landing Page Component
        function LandingPage({ onNavigate }) {
            return (
                <div className="min-h-screen">
                    <header className="bg-gray-900/95 backdrop-blur-sm border-b border-gray-800 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center py-4">
                                <LogoTAD />
                                <nav className="hidden md:flex space-x-8">
                                    <a href="#como-funciona" className="text-gray-300 hover:text-yellow-400 transition">Cómo Funciona</a>
                                    <a href="#ganancias" className="text-gray-300 hover:text-yellow-400 transition">Ganancias</a>
                                    <a href="#beneficios" className="text-gray-300 hover:text-yellow-400 transition">Beneficios</a>
                                </nav>
                                <button onClick={() => onNavigate('register')} className="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-full transition transform hover:scale-105">
                                    Comenzar a Ganar
                                </button>
                            </div>
                        </div>
                    </header>

                    <section className="relative py-20 px-4 overflow-hidden">
                        <div className="max-w-7xl mx-auto text-center">
                            <h1 className="text-5xl md:text-6xl font-bold mb-6 animate-fade-in">
                                Tu Vehículo, Tu <span className="text-yellow-400">Valla Digital</span>
                            </h1>
                            <p className="text-xl text-gray-400 mb-8 max-w-3xl mx-auto animate-fade-in delay-100">
                                Gana dinero extra mientras conduces. Instalamos tablets de 10" para entretener a tus pasajeros y generar ingresos por publicidad.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center animate-fade-in delay-200">
                                <button onClick={() => onNavigate('register')} className="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 px-8 rounded-full text-lg transition transform hover:scale-105">
                                    ¡Quiero Unirme!
                                </button>
                                <button onClick={() => onNavigate('calculator')} className="bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 px-8 rounded-full text-lg transition">
                                    Calcula Tus Ganancias
                                </button>
                            </div>
                        </div>
                    </section>

                    <section id="como-funciona" className="py-20 bg-gray-800">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-4xl font-bold text-center mb-12">¿Cómo Funciona?</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                <div className="text-center p-6 bg-gray-900 rounded-xl">
                                    <div className="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">1</div>
                                    <h3 className="text-xl font-bold mb-2">Regístrate</h3>
                                    <p className="text-gray-400">Completa tu registro en 4 pasos simples</p>
                                </div>
                                <div className="text-center p-6 bg-gray-900 rounded-xl">
                                    <div className="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">2</div>
                                    <h3 className="text-xl font-bold mb-2">Instalamos</h3>
                                    <p className="text-gray-400">Coordinamos la instalación de la tablet en tu vehículo</p>
                                </div>
                                <div className="text-center p-6 bg-gray-900 rounded-xl">
                                    <div className="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">3</div>
                                    <h3 className="text-xl font-bold mb-2">Gana</h3>
                                    <p className="text-gray-400">Recibe RD$500 por cada anuncio activo mensualmente</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="ganancias" className="py-20">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-4xl font-bold text-center mb-12">Tus Ganancias</h2>
                            <div className="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                                <div className="bg-gray-800 p-8 rounded-xl">
                                    <h3 className="text-2xl font-bold mb-4">Por Anuncio</h3>
                                    <p className="text-5xl font-bold text-yellow-400 mb-2">RD$500</p>
                                    <p className="text-gray-400">por cada anunciante al mes</p>
                                </div>
                                <div className="bg-gray-800 p-8 rounded-xl">
                                    <h3 className="text-2xl font-bold mb-4">Máximo Mensual</h3>
                                    <p className="text-5xl font-bold text-yellow-400 mb-2">RD$7,500</p>
                                    <p className="text-gray-400">con 15 anuncios activos</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-20 bg-yellow-500">
                        <div className="max-w-4xl mx-auto text-center px-4">
                            <h2 className="text-4xl font-bold text-black mb-4">¿Listo para Comenzar?</h2>
                            <p className="text-xl text-black/80 mb-8">Únete a TAD Dominicana y comienza a generar ingresos extra hoy mismo</p>
                            <button onClick={() => onNavigate('register')} className="bg-black hover:bg-gray-800 text-yellow-400 font-bold py-4 px-12 rounded-full text-lg transition transform hover:scale-105">
                                Registrarme Ahora
                            </button>
                        </div>
                    </section>

                    <footer className="bg-gray-900 py-8 border-t border-gray-800">
                        <div className="max-w-7xl mx-auto px-4 text-center text-gray-400">
                            <p>&copy; 2026 TAD Dominicana, S.R.L. Todos los derechos reservados.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Calculator Page Component
        function CalculatorPage({ onNavigate }) {
            const [ads, setAds] = React.useState(5);
            const [referrals, setReferrals] = React.useState(0);
            const earnings = (ads * 500) + (referrals * 500);
            
            return (
                <div className="min-h-screen pt-20 px-4">
                    <div className="max-w-2xl mx-auto">
                        <button onClick={() => onNavigate('landing')} className="text-gray-400 hover:text-white mb-8">← Volver</button>
                        <h1 className="text-4xl font-bold mb-8">Calculadora de Ganancias</h1>
                        
                        <div className="bg-gray-800 p-8 rounded-xl">
                            <div className="mb-6">
                                <label className="block text-sm font-medium mb-2">Anuncios en tu vehículo: {ads}</label>
                                <input 
                                    type="range" 
                                    min="1" 
                                    max="15" 
                                    value={ads} 
                                    onChange={(e) => setAds(Number(e.target.value))} 
                                    className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" 
                                />
                                <p className="text-gray-400 text-sm mt-2">Máximo 15 anuncios simultáneos</p>
                            </div>
                            
                            <div className="mb-6">
                                <label className="block text-sm font-medium mb-2">Conductores referidos: {referrals}</label>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="100" 
                                    value={referrals} 
                                    onChange={(e) => setReferrals(Number(e.target.value))} 
                                    className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" 
                                />
                                <p className="text-gray-400 text-sm mt-2">Gana RD$500 por cada referido (hasta 100)</p>
                            </div>
                            
                            <div className="border-t border-gray-700 pt-6">
                                <p className="text-gray-400 mb-2">Ganancia Mensual Estimada</p>
                                <p className="text-5xl font-bold text-yellow-400">RD$ {earnings.toLocaleString()}</p>
                                <p className="text-gray-400 text-sm mt-2">
                                    RD$ {ads * 500} (anuncios) + RD$ {referrals * 500} (referidos)
                                </p>
                            </div>
                            
                            <button onClick={() => onNavigate('register')} className="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-full mt-6 transition">
                                ¡Quiero Ganar Esto!
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Register Page Component
        function RegisterPage({ onNavigate }) {
            const [formData, setFormData] = React.useState({
                // Paso 1: Datos Personales
                nombre: '',
                apellido: '',
                cedula: '',
                telefono: '',
                correo: '',
                // Paso 2: Datos del Vehículo
                marca: '',
                modelo: '',
                ano: '',
                placa: '',
                // Paso 3: Información Laboral
                plataformas: '',
                horasDiarias: '',
                diasSemana: '',
                ciudad: '',
                horario: '',
                // Paso 4: Equipamiento y Experiencia
                tieneTablet: '',
                experienciaVentas: '',
                aceptaContrato: false
            });
            const [step, setStep] = React.useState(1);
            const [loading, setLoading] = React.useState(false);
            const [submitted, setSubmitted] = React.useState(false);

            const handleInputChange = React.useCallback((field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            }, []);

            const nextStep = React.useCallback(() => {
                if (step === 1) {
                    // Validar campos requeridos
                    if (!formData.nombre || !formData.apellido || !formData.cedula || !formData.telefono) {
                        alert('⚠️ Por favor completa todos los campos obligatorios');
                        return;
                    }
                    // Validar cédula (11 dígitos)
                    if (!isValidCedula(formData.cedula)) {
                        alert('⚠️ La cédula debe tener 11 dígitos numéricos');
                        return;
                    }
                    // Validar teléfono
                    if (!isValidPhone(formData.telefono)) {
                        alert('⚠️ Ingresa un teléfono válido (ej: +18495043872)');
                        return;
                    }
                    // Validar email si está presente
                    if (formData.correo && !isValidEmail(formData.correo)) {
                        alert('⚠️ El email no es válido');
                        return;
                    }
                }
                if (step === 2) {
                    if (!formData.marca || !formData.modelo || !formData.ano || !formData.placa) {
                        alert('⚠️ Por favor completa todos los campos del vehículo');
                        return;
                    }
                    // Validar año (1990-2026)
                    const ano = parseInt(formData.ano);
                    if (ano < 1990 || ano > 2026) {
                        alert('⚠️ El año debe estar entre 1990 y 2026');
                        return;
                    }
                    // Validar placa
                    if (!isValidPlaca(formData.placa)) {
                        alert('⚠️ La placa debe ser formato: ABC123 o ABC1234');
                        return;
                    }
                }
                if (step === 3) {
                    if (!formData.plataformas || !formData.horasDiarias || !formData.diasSemana || !formData.ciudad || !formData.horario) {
                        alert('⚠️ Por favor completa todos los campos laborales');
                        return;
                    }
                }
                setStep(prev => prev + 1);
            }, [step, formData]);

            const handleSubmit = React.useCallback(async (e) => {
                e.preventDefault();
                
                // Verificar rate limiting
                const rateCheck = checkRateLimit();
                if (!rateCheck.allowed) {
                    alert(`⚠️ Por favor espera ${rateCheck.waitTime} segundos antes de enviar otro formulario`);
                    return;
                }
                
                setLoading(true);
                
                // Sanitizar todos los datos antes de enviar
                const sanitizedData = {
                    nombre: sanitizeInput(formData.nombre),
                    apellido: sanitizeInput(formData.apellido),
                    cedula: sanitizeInput(formData.cedula.replace(/[\-\s]/g, '')),
                    telefono: sanitizeInput(formData.telefono.replace(/[\s\-\(\)]/g, '')),
                    correo: sanitizeInput(formData.correo.toLowerCase().trim()),
                    marca: sanitizeInput(formData.marca),
                    modelo: sanitizeInput(formData.modelo),
                    ano: sanitizeInput(formData.ano),
                    placa: sanitizeInput(formData.placa.toUpperCase().replace(/[\-\s]/g, '')),
                    plataformas: sanitizeInput(formData.plataformas),
                    horasDiarias: sanitizeInput(formData.horasDiarias),
                    diasSemana: sanitizeInput(formData.diasSemana),
                    ciudad: sanitizeInput(formData.ciudad),
                    horario: sanitizeInput(formData.horario),
                    tieneTablet: sanitizeInput(formData.tieneTablet),
                    experienciaVentas: sanitizeInput(formData.experienciaVentas),
                    aplicacion: 'Web'
                };
                
                // Preparar datos como URLSearchParams
                const params = new URLSearchParams(sanitizedData);
                
                console.log('🔒 Datos sanitizados enviados:', Object.fromEntries(params));
                
                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: params.toString()
                    });
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    console.log('✅ Datos enviados exitosamente');
                    setRateLimit(); // Activar rate limiting después de envío exitoso
                    setSubmitted(true);
                } catch (error) {
                    console.error('❌ Error completo:', error);
                    alert('Error al enviar: ' + error.message + '. Intenta de nuevo o contacta por WhatsApp.');
                }
                setLoading(false);
            }, [formData]);

            if (submitted) {
                return (
                    <div className="min-h-screen flex items-center justify-center px-4">
                        <div className="text-center">
                            <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                            <h1 className="text-3xl font-bold mb-4">¡Registro Exitoso!</h1>
                            <p className="text-gray-400 mb-8">Te redirigiremos a WhatsApp para completar tu registro</p>
                            <a 
                                href={`https://wa.me/${whatsappPhone}?text=Hola!%20Acabo%20de%20completar%20mi%20registro%20en%20TAD%20Dominicana`} 
                                className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition inline-block"
                                target="_blank"
                                rel="noopener noreferrer"
                            >
                                Ir a WhatsApp →
                            </a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pt-20 px-4">
                    <div className="max-w-2xl mx-auto">
                        <button onClick={() => onNavigate('landing')} className="text-gray-400 hover:text-white mb-8">← Volver</button>
                        
                        <div className="flex justify-between mb-8">
                            {[1, 2, 3, 4].map(i => (
                                <div key={i} className={`flex-1 h-2 mx-2 rounded ${step >= i ? 'bg-yellow-500' : 'bg-gray-700'}`}></div>
                            ))}
                        </div>
                        
                        <form onSubmit={handleSubmit} className="bg-gray-800 p-8 rounded-xl">
                            {/* PASO 1: Datos Personales */}
                            {step === 1 && (
                                <div>
                                    <h2 className="text-2xl font-bold mb-6">Datos Personales</h2>
                                    <input 
                                        type="text" 
                                        placeholder="Nombre" 
                                        value={formData.nombre}
                                        onChange={(e) => handleInputChange('nombre', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="Apellido" 
                                        value={formData.apellido}
                                        onChange={(e) => handleInputChange('apellido', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="Cédula" 
                                        value={formData.cedula}
                                        onChange={(e) => handleInputChange('cedula', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="tel" 
                                        placeholder="Teléfono" 
                                        value={formData.telefono}
                                        onChange={(e) => handleInputChange('telefono', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="email" 
                                        placeholder="Correo electrónico (opcional)" 
                                        value={formData.correo}
                                        onChange={(e) => handleInputChange('correo', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <button type="button" onClick={nextStep} className="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition">Siguiente</button>
                                </div>
                            )}
                            
                            {/* PASO 2: Datos del Vehículo */}
                            {step === 2 && (
                                <div>
                                    <h2 className="text-2xl font-bold mb-6">Datos del Vehículo</h2>
                                    <input 
                                        type="text" 
                                        placeholder="Marca" 
                                        value={formData.marca}
                                        onChange={(e) => handleInputChange('marca', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="Modelo" 
                                        value={formData.modelo}
                                        onChange={(e) => handleInputChange('modelo', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="number" 
                                        placeholder="Año" 
                                        value={formData.ano}
                                        onChange={(e) => handleInputChange('ano', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="Placa" 
                                        value={formData.placa}
                                        onChange={(e) => handleInputChange('placa', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500" 
                                    />
                                    <button type="button" onClick={nextStep} className="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition">Siguiente</button>
                                </div>
                            )}
                            
                            {/* PASO 3: Información Laboral */}
                            {step === 3 && (
                                <div>
                                    <h2 className="text-2xl font-bold mb-6">Información Laboral</h2>
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300">¿En qué plataformas trabajas?</label>
                                    <select 
                                        value={formData.plataformas}
                                        onChange={(e) => handleInputChange('plataformas', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500"
                                    >
                                        <option value="">Selecciona una opción</option>
                                        <option value="Uber">Uber</option>
                                        <option value="DiDi">DiDi</option>
                                        <option value="inDrive">inDrive</option>
                                        <option value="Taxi Libre">Taxi Libre</option>
                                        <option value="Base">Base</option>
                                        <option value="Múltiples">Múltiples plataformas</option>
                                        <option value="Otro">Otro</option>
                                    </select>
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300 mt-4">¿Cuántas horas al día trabajas?</label>
                                    <select 
                                        value={formData.horasDiarias}
                                        onChange={(e) => handleInputChange('horasDiarias', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500"
                                    >
                                        <option value="">Selecciona una opción</option>
                                        <option value="1-4 horas">1-4 horas</option>
                                        <option value="4-6 horas">4-6 horas</option>
                                        <option value="6-8 horas">6-8 horas</option>
                                        <option value="8-10 horas">8-10 horas</option>
                                        <option value="10+ horas">10+ horas</option>
                                        <option value="Tiempo completo">Tiempo completo</option>
                                    </select>
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300 mt-4">¿Cuántos días a la semana trabajas?</label>
                                    <select 
                                        value={formData.diasSemana}
                                        onChange={(e) => handleInputChange('diasSemana', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500"
                                    >
                                        <option value="">Selecciona una opción</option>
                                        <option value="1-3 días">1-3 días</option>
                                        <option value="4-5 días">4-5 días</option>
                                        <option value="6 días">6 días</option>
                                        <option value="7 días">7 días</option>
                                        <option value="Fines de semana">Solo fines de semana</option>
                                    </select>
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300 mt-4">¿En qué ciudad trabajas principalmente?</label>
                                    <input 
                                        type="text" 
                                        placeholder="Ej: Santiago, Santo Domingo, etc." 
                                        value={formData.ciudad}
                                        onChange={(e) => handleInputChange('ciudad', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" 
                                    />
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300 mt-4">¿En qué horario trabajas?</label>
                                    <select 
                                        value={formData.horario}
                                        onChange={(e) => handleInputChange('horario', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500"
                                    >
                                        <option value="">Selecciona una opción</option>
                                        <option value="Mañana (6AM-12PM)">Mañana (6AM-12PM)</option>
                                        <option value="Tarde (12PM-6PM)">Tarde (12PM-6PM)</option>
                                        <option value="Noche (6PM-12AM)">Noche (6PM-12AM)</option>
                                        <option value="Madrugada (12AM-6AM)">Madrugada (12AM-6AM)</option>
                                        <option value="Horario partido">Horario partido</option>
                                        <option value="Flexible">Flexible</option>
                                    </select>
                                    
                                    <button type="button" onClick={nextStep} className="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition">Siguiente</button>
                                </div>
                            )}
                            
                            {/* PASO 4: Equipamiento y Experiencia */}
                            {step === 4 && (
                                <div>
                                    <h2 className="text-2xl font-bold mb-6">Equipamiento y Experiencia</h2>
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300">¿Cuentas con una tablet de 10 pulgadas?</label>
                                    <select 
                                        value={formData.tieneTablet}
                                        onChange={(e) => handleInputChange('tieneTablet', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500"
                                    >
                                        <option value="">Selecciona una opción</option>
                                        <option value="Sí, propia">Sí, propia</option>
                                        <option value="Sí, pero es de otra persona">Sí, pero es de otra persona</option>
                                        <option value="No, necesito una">No, necesito una</option>
                                        <option value="No me interesa">No me interesa</option>
                                    </select>
                                    
                                    <label className="block text-sm font-medium mb-2 text-gray-300">¿Tienes experiencia en ventas?</label>
                                    <select 
                                        value={formData.experienciaVentas}
                                        onChange={(e) => handleInputChange('experienciaVentas', e.target.value)}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500"
                                    >
                                        <option value="">Selecciona una opción</option>
                                        <option value="Sí, mucha experiencia">Sí, mucha experiencia</option>
                                        <option value="Sí, algo de experiencia">Sí, algo de experiencia</option>
                                        <option value="No, pero quiero aprender">No, pero quiero aprender</option>
                                        <option value="No me interesa">No me interesa</option>
                                    </select>
                                    
                                    <div className="bg-gray-900 p-4 rounded-lg h-48 overflow-y-scroll mb-6 text-sm text-gray-300">
                                        <p className="mb-4"><strong>CONTRATO DE COLABORACIÓN MERCANTIL</strong></p>
                                        <p>Por este documento, TAD Dominicana, S.R.L. y el conductor acuerdan:</p>
                                        <ul className="list-disc pl-5 mt-2 space-y-1">
                                            <li>El conductor permite instalación de tablet publicitaria</li>
                                            <li>Suscripción anual: RD$6,000 (tablet en comodato)</li>
                                            <li>Comisión: RD$500 por anuncio activo/mes</li>
                                            <li>No existe relación laboral</li>
                                            <li>Sin exclusividad (puede trabajar con Uber, DiDi, etc.)</li>
                                        </ul>
                                    </div>
                                    <label className="flex items-center mb-6">
                                        <input 
                                            type="checkbox" 
                                            checked={formData.aceptaContrato}
                                            onChange={(e) => handleInputChange('aceptaContrato', e.target.checked)}
                                            className="w-5 h-5 text-yellow-500 rounded focus:ring-yellow-500" 
                                        />
                                        <span className="ml-2 text-gray-300">Acepto los términos del contrato</span>
                                    </label>
                                    <button 
                                        type="submit" 
                                        disabled={loading || !formData.aceptaContrato} 
                                        className="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        {loading ? 'Enviando...' : 'Completar Registro'}
                                    </button>
                                </div>
                            )}
                        </form>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [view, setView] = React.useState('landing');

            return view === 'landing' 
                ? <LandingPage onNavigate={setView} /> 
                : view === 'calculator' 
                    ? <CalculatorPage onNavigate={setView} /> 
                    : <RegisterPage onNavigate={setView} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
