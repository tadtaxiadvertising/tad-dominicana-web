<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAD Dominicana - Tu Vehículo, Tu Valla Digital</title>
  <meta name="description" content="Gana dinero extra mientras conduces. Instalamos tablets de 10 pulgadas para entretener a tus pasajeros y generar ingresos por publicidad." />
  <script>
    (() => {
      const originalWarn = console.warn.bind(console);
      console.warn = (...args) => {
        const firstArg = String(args[0] ?? '');
        if (firstArg.includes('cdn.tailwindcss.com should not be used in production')) {
          return;
        }
        originalWarn(...args);
      };
      window.__restoreTailwindWarn = () => {
        console.warn = originalWarn;
      };
    })();
  </script>
  <script src="https://cdn.tailwindcss.com" onload="window.__restoreTailwindWarn && window.__restoreTailwindWarn()"></script>
</head>
<body class="bg-black text-white">
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
