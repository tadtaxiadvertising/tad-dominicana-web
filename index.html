<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAD Dominicana - Tu Vehículo, Tu Valla Digital</title>
    <meta name="description" content="Gana dinero extra mientras conduces. Instalamos tablets de 10 pulgadas para entretener a tus pasajeros y generar ingresos por publicidad." />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Google Apps Script URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbyF5Sk3R51l0J3bP5lgM2_MV6Qs47Wo-a8wQFme5cBpaNUnlH85h5Z37P6_2fXZRDVh/exec";
        const whatsappPhone = "18495043872";

        // Logo Component
        const LogoTAD = () => (
            <svg viewBox="0 0 200 60" fill="none" className="w-32 h-auto">
                <rect x="35" y="15" width="45" height="30" rx="5" stroke="#FFD700" strokeWidth="4"/>
                <polygon points="50,22 68,30 50,38" fill="#FFD700"/>
                <text x="90" y="40" fill="#FFD700" fontFamily="sans-serif" fontSize="28" fontWeight="bold">TAD</text>
            </svg>
        );

        // Main App
        function App() {
            const [view, setView] = useState('landing');
            const [formData, setFormData] = useState({});
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);

            // Landing Page
            const LandingPage = () => (
                <div class="min-h-screen">
                    {/* Header */}
                    <header class="bg-gray-900/95 backdrop-blur-sm border-b border-gray-800 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex justify-between items-center py-4">
                                <LogoTAD />
                                <nav class="hidden md:flex space-x-8">
                                    <a href="#como-funciona" class="text-gray-300 hover:text-yellow-400 transition">Cómo Funciona</a>
                                    <a href="#ganancias" class="text-gray-300 hover:text-yellow-400 transition">Ganancias</a>
                                    <a href="#beneficios" class="text-gray-300 hover:text-yellow-400 transition">Beneficios</a>
                                </nav>
                                <button onClick={() => setView('register')} class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-full transition transform hover:scale-105">
                                    Comenzar a Ganar
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Hero */}
                    <section class="relative py-20 px-4 overflow-hidden">
                        <div class="max-w-7xl mx-auto text-center">
                            <h1 class="text-5xl md:text-6xl font-bold mb-6 animate-fade-in">
                                Tu Vehículo, Tu <span class="text-yellow-400">Valla Digital</span>
                            </h1>
                            <p class="text-xl text-gray-400 mb-8 max-w-3xl mx-auto animate-fade-in delay-100">
                                Gana dinero extra mientras conduces. Instalamos tablets de 10" para entretener a tus pasajeros y generar ingresos por publicidad.
                            </p>
                            <div class="flex flex-col sm:flex-row gap-4 justify-center animate-fade-in delay-200">
                                <button onClick={() => setView('register')} class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 px-8 rounded-full text-lg transition transform hover:scale-105">
                                    ¡Quiero Unirme!
                                </button>
                                <button onClick={() => setView('calculator')} class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 px-8 rounded-full text-lg transition">
                                    Calcula Tus Ganancias
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* Cómo Funciona */}
                    <section id="como-funciona" class="py-20 bg-gray-800">
                        <div class="max-w-7xl mx-auto px-4">
                            <h2 class="text-4xl font-bold text-center mb-12">¿Cómo Funciona?</h2>
                            <div class="grid md:grid-cols-3 gap-8">
                                <div class="text-center p-6 bg-gray-900 rounded-xl">
                                    <div class="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">1</div>
                                    <h3 class="text-xl font-bold mb-2">Regístrate</h3>
                                    <p class="text-gray-400">Completa tu registro en 3 pasos simples</p>
                                </div>
                                <div class="text-center p-6 bg-gray-900 rounded-xl">
                                    <div class="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">2</div>
                                    <h3 class="text-xl font-bold mb-2">Instalamos</h3>
                                    <p class="text-gray-400">Coordinamos la instalación de la tablet en tu vehículo</p>
                                </div>
                                <div class="text-center p-6 bg-gray-900 rounded-xl">
                                    <div class="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">3</div>
                                    <h3 class="text-xl font-bold mb-2">Gana</h3>
                                    <p class="text-gray-400">Recibe RD$500 por cada anuncio activo mensualmente</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Ganancias */}
                    <section id="ganancias" class="py-20">
                        <div class="max-w-7xl mx-auto px-4">
                            <h2 class="text-4xl font-bold text-center mb-12">Tus Ganancias</h2>
                            <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                                <div class="bg-gray-800 p-8 rounded-xl">
                                    <h3 class="text-2xl font-bold mb-4">Por Anuncio</h3>
                                    <p class="text-5xl font-bold text-yellow-400 mb-2">RD$500</p>
                                    <p class="text-gray-400">por cada anunciante al mes</p>
                                </div>
                                <div class="bg-gray-800 p-8 rounded-xl">
                                    <h3 class="text-2xl font-bold mb-4">Máximo Mensual</h3>
                                    <p class="text-5xl font-bold text-yellow-400 mb-2">RD$7,500</p>
                                    <p class="text-gray-400">con 15 anuncios activos</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CTA Final */}
                    <section class="py-20 bg-yellow-500">
                        <div class="max-w-4xl mx-auto text-center px-4">
                            <h2 class="text-4xl font-bold text-black mb-4">¿Listo para Comenzar?</h2>
                            <p class="text-xl text-black/80 mb-8">Únete a TAD Dominicana y comienza a generar ingresos extra hoy mismo</p>
                            <button onClick={() => setView('register')} class="bg-black hover:bg-gray-800 text-yellow-400 font-bold py-4 px-12 rounded-full text-lg transition transform hover:scale-105">
                                Registrarme Ahora
                            </button>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer class="bg-gray-900 py-8 border-t border-gray-800">
                        <div class="max-w-7xl mx-auto px-4 text-center text-gray-400">
                            <p>&copy; 2026 TAD Dominicana, S.R.L. Todos los derechos reservados.</p>
                        </div>
                    </footer>
                </div>
            );

            // Calculator Page
            const CalculatorPage = () => {
                const [ads, setAds] = useState(5);
                const referrals, setReferrals] = useState(0);
                
                const earnings = (ads * 500) + (referrals * 500);
                
                return (
                    <div class="min-h-screen pt-20 px-4">
                        <div class="max-w-2xl mx-auto">
                            <button onClick={() => setView('landing')} class="text-gray-400 hover:text-white mb-8">← Volver</button>
                            <h1 class="text-4xl font-bold mb-8">Calculadora de Ganancias</h1>
                            
                            <div class="bg-gray-800 p-8 rounded-xl">
                                <div class="mb-6">
                                    <label class="block text-sm font-medium mb-2">Anuncios en tu vehículo: {ads}</label>
                                    <input type="range" min="1" max="15" value={ads} onChange={(e) => setAds(Number(e.target.value))} class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                                    <p class="text-gray-400 text-sm mt-2">Máximo 15 anuncios simultáneos</p>
                                </div>
                                
                                <div class="mb-6">
                                    <label class="block text-sm font-medium mb-2">Conductores referidos: {referrals}</label>
                                    <input type="range" min="0" max="20" value={referrals} onChange={(e) => setReferrals(Number(e.target.value))} class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                                    <p class="text-gray-400 text-sm mt-2">Gana RD$500 por cada referido</p>
                                </div>
                                
                                <div class="border-t border-gray-700 pt-6">
                                    <p class="text-gray-400 mb-2">Ganancia Mensual Estimada</p>
                                    <p class="text-5xl font-bold text-yellow-400">RD$ {earnings.toLocaleString()}</p>
                                </div>
                                
                                <button onClick={() => setView('register')} class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-full mt-6 transition">
                                    ¡Quiero Ganar Esto!
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Register Page
            const RegisterPage = () => {
                if (submitted) {
                    return (
                        <div class="min-h-screen flex items-center justify-center px-4">
                            <div class="text-center">
                                <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                    </svg>
                                </div>
                                <h1 class="text-3xl font-bold mb-4">¡Registro Exitoso!</h1>
                                <p class="text-gray-400 mb-8">Te redirigiremos a WhatsApp para completar tu registro</p>
                                <a href={`https://wa.me/${whatsappPhone}?text=Hola!%20Acabo%20de%20completar%20mi%20registro%20en%20TAD%20Dominicana`} class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition inline-block">
                                    Ir a WhatsApp
                                </a>
                            </div>
                        </div>
                    );
                }

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    setLoading(true);
                    
                    try {
                        await fetch(scriptURL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({...formData, fecha: new Date().toISOString()})
                        });
                        setSubmitted(true);
                    } catch (error) {
                        alert('Error al enviar. Intenta de nuevo.');
                    }
                    setLoading(false);
                };

                return (
                    <div class="min-h-screen pt-20 px-4">
                        <div class="max-w-2xl mx-auto">
                            <button onClick={() => setView('landing')} class="text-gray-400 hover:text-white mb-8">← Volver</button>
                            
                            {/* Progress */}
                            <div class="flex justify-between mb-8">
                                {[1, 2, 3].map(i => (
                                    <div key={i} class={`flex-1 h-2 mx-2 rounded ${step >= i ? 'bg-yellow-500' : 'bg-gray-700'}`}></div>
                                ))}
                            </div>
                            
                            <form onSubmit={handleSubmit} class="bg-gray-800 p-8 rounded-xl">
                                {step === 1 && (
                                    <div>
                                        <h2 class="text-2xl font-bold mb-6">Datos Personales</h2>
                                        <input required type="text" placeholder="Nombre" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, nombre: e.target.value})} />
                                        <input required type="text" placeholder="Apellido" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, apellido: e.target.value})} />
                                        <input required type="text" placeholder="Cédula" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, cedula: e.target.value})} />
                                        <input required type="tel" placeholder="Teléfono" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, telefono: e.target.value})} />
                                        <button type="button" onClick={() => setStep(2)} class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition">Siguiente</button>
                                    </div>
                                )}
                                
                                {step === 2 && (
                                    <div>
                                        <h2 class="text-2xl font-bold mb-6">Datos del Vehículo</h2>
                                        <input required type="text" placeholder="Marca" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, marca: e.target.value})} />
                                        <input required type="text" placeholder="Modelo" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, modelo: e.target.value})} />
                                        <input required type="number" placeholder="Año" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-4 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, ano: e.target.value})} />
                                        <input required type="text" placeholder="Placa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-yellow-500" onChange={e => setFormData({...formData, placa: e.target.value})} />
                                        <button type="button" onClick={() => setStep(3)} class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition">Siguiente</button>
                                    </div>
                                )}
                                
                                {step === 3 && (
                                    <div>
                                        <h2 class="text-2xl font-bold mb-6">Contrato</h2>
                                        <div class="bg-gray-900 p-4 rounded-lg h-48 overflow-y-scroll mb-6 text-sm text-gray-300">
                                            <p class="mb-4"><strong>CONTRATO DE COLABORACIÓN MERCANTIL</strong></p>
                                            <p>Por este documento, TAD Dominicana, S.R.L. y el conductor acuerdan:</p>
                                            <ul class="list-disc pl-5 mt-2 space-y-1">
                                                <li>El conductor permite instalación de tablet publicitaria</li>
                                                <li>Suscripción anual: RD$6,000 (tablet en comodato)</li>
                                                <li>Comisión: RD$500 por anuncio activo/mes</li>
                                                <li>No existe relación laboral</li>
                                                <li>Sin exclusividad (puede trabajar con Uber, DiDi, etc.)</li>
                                            </ul>
                                        </div>
                                        <label class="flex items-center mb-6">
                                            <input required type="checkbox" class="w-5 h-5 text-yellow-500 rounded focus:ring-yellow-500" />
                                            <span class="ml-2 text-gray-300">Acepto los términos del contrato</span>
                                        </label>
                                        <button type="submit" disabled={loading} class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-full transition disabled:opacity-50">
                                            {loading ? 'Enviando...' : 'Completar Registro'}
                                        </button>
                                    </div>
                                )}
                            </form>
                        </div>
                    </div>
                );
            };

            // Render current view
            return view === 'landing' ? <LandingPage /> : view === 'calculator' ? <CalculatorPage /> : <RegisterPage />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
